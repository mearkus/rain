<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tile Preview</title>
  <style>
    body { background:#050508; margin:0; padding:20px; font-family:monospace; color:#00f5ff; }
    h2 { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#9b5de5; margin:20px 0 8px; }
    .grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:24px; }
    .tile-wrap { width:72px; height:72px; border-radius:3px; overflow:hidden;
      border:1px solid rgba(0,245,255,0.18);
      box-shadow:0 0 12px rgba(0,0,0,.8),0 0 5px rgba(0,245,255,.12); }
    .label { font-size:9px; color:#3a3a6a; margin-top:2px; text-align:center; }
  </style>
</head>
<body>
<script>
const TILES=[
  [0,1,2,3],[1,2,3,0],[2,3,0,1],[3,0,1,2],
  [4,5,6,7],[5,6,7,4],[6,7,4,5],[7,4,5,6],
  [0,1,4,5],[1,4,5,0],[4,5,0,1],[5,0,1,4],
  [2,3,6,7],[3,6,7,2],[6,7,2,3],[7,2,3,6],
  [0,2,4,6],[2,4,6,0],[4,6,0,2],[6,0,2,4],
  [1,3,5,7],[3,5,7,1],[5,7,1,3],[7,1,3,5],
  [0,2,5,7],[1,3,4,6],[3,7,0,4],[2,6,1,5],
];
const FLOWER_COLORS=['#ff006e','#4d9fff','#00f5ff','#f700ff','#9b5de5','#39ff14','#ff6b00','#ffe600'];
const FLOWER_NAMES=['Rose','Iris','Lotus','Cherry','Plum','Lily','Orchid','Peony'];
const TRACE_DIRS=[
  [50,37,50,12,  50, 6.5,8,5],
  [61,50,88,50,  93.5,50,5,8],
  [50,63,50,88,  50,93.5,8,5],
  [39,50,12,50,   6.5,50,5,8],
];

function lcg(seed){let s=(seed*1664525+1013904223)>>>0;return()=>{s=(s*1664525+1013904223)>>>0;return s/0x100000000;};}
function el(ns,tag,attrs){const e=document.createElementNS(ns,tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e;}

function addPCBCorners(svg,ns,seed){
  const rng=lcg(seed);
  const corners=[{x:7,y:7,w:30,h:28},{x:63,y:7,w:30,h:28},{x:7,y:65,w:30,h:28},{x:63,y:65,w:30,h:28}];
  for(const c of corners){
    const r=()=>c.x+rng()*c.w, d=()=>c.y+rng()*c.h;
    const[ax,ay,bx,by]=[r(),d(),r(),d()];
    svg.appendChild(el(ns,'path',{d:`M ${ax.toFixed(1)},${ay.toFixed(1)} L ${bx.toFixed(1)},${ay.toFixed(1)} L ${bx.toFixed(1)},${by.toFixed(1)}`,fill:'none',stroke:'rgba(0,245,255,0.09)','stroke-width':'0.7'}));
    for(let p=0;p<2;p++){const[px,py]=[r(),d()];svg.appendChild(el(ns,'rect',{x:(px-2).toFixed(1),y:(py-1.2).toFixed(1),width:'4',height:'2.4',rx:'0.4',fill:'rgba(0,245,255,0.06)',stroke:'rgba(0,245,255,0.13)','stroke-width':'0.4'}));}
    const[vx,vy]=[r(),d()];
    svg.appendChild(el(ns,'circle',{cx:vx.toFixed(1),cy:vy.toFixed(1),r:'2',fill:'none',stroke:'rgba(0,245,255,0.13)','stroke-width':'0.5'}));
    svg.appendChild(el(ns,'circle',{cx:vx.toFixed(1),cy:vy.toFixed(1),r:'0.7',fill:'rgba(0,245,255,0.22)'}));
  }
}

function makeTile(edges, tileIdx=0){
  const ns='http://www.w3.org/2000/svg';
  const svg=el(ns,'svg',{viewBox:'0 0 100 100',width:'100%',height:'100%'});
  svg.appendChild(el(ns,'rect',{width:'100',height:'100',fill:'#080810'}));
  addPCBCorners(svg,ns,tileIdx*7+3);
  for(let i=0;i<4;i++){
    const c=FLOWER_COLORS[edges[i]];
    const[x1,y1,x2,y2,cx,cy,pw,ph]=TRACE_DIRS[i];
    svg.appendChild(el(ns,'line',{x1,y1,x2,y2,stroke:c,'stroke-width':'5','stroke-opacity':'0.18'}));
    svg.appendChild(el(ns,'line',{x1,y1,x2,y2,stroke:c,'stroke-width':'1.8'}));
    svg.appendChild(el(ns,'rect',{x:(cx-pw/2).toFixed(1),y:(cy-ph/2).toFixed(1),width:pw,height:ph,rx:'1',fill:'#060612',stroke:c,'stroke-width':'1.2'}));
    svg.appendChild(el(ns,'circle',{cx,cy,r:'1.8',fill:c,'fill-opacity':'0.9'}));
  }
  const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${(50+13*Math.cos(a)).toFixed(2)},${(50+13*Math.sin(a)).toFixed(2)}`;}).join(' ');
  svg.appendChild(el(ns,'polygon',{points:pts,fill:'#050510',stroke:'rgba(0,245,255,0.5)','stroke-width':'1.2'}));
  svg.appendChild(el(ns,'circle',{cx:'50',cy:'50',r:'6.5',fill:'none',stroke:'rgba(0,245,255,0.6)','stroke-width':'0.8'}));
  for(const[x1,y1,x2,y2]of[[43,50,57,50],[50,43,50,57]])svg.appendChild(el(ns,'line',{x1,y1,x2,y2,stroke:'rgba(0,245,255,0.45)','stroke-width':'0.7'}));
  svg.appendChild(el(ns,'circle',{cx:'50',cy:'50',r:'4',fill:'rgba(0,245,255,0.12)'}));
  svg.appendChild(el(ns,'circle',{cx:'50',cy:'50',r:'2',fill:'#00f5ff'}));
  return svg;
}

function tile(edges, label, idx=0){
  const col=document.createElement('div');
  const wrap=document.createElement('div'); wrap.className='tile-wrap';
  wrap.appendChild(makeTile(edges,idx));
  const lbl=document.createElement('div'); lbl.className='label'; lbl.textContent=label;
  col.append(wrap,lbl); return col;
}

function rotate(e,r){const[t,ri,b,l]=e;switch(r&3){case 1:return[l,t,ri,b];case 2:return[b,l,t,ri];case 3:return[ri,b,l,t];default:return[t,ri,b,l];}}

const h1=document.createElement('h2'); h1.textContent='All 28 tiles'; document.body.appendChild(h1);
const g1=document.createElement('div'); g1.className='grid';
TILES.forEach((e,i)=>g1.appendChild(tile(e,i,i)));
document.body.appendChild(g1);

const h2=document.createElement('h2'); h2.textContent='Tile #0 — 4 rotations'; document.body.appendChild(h2);
const g2=document.createElement('div'); g2.className='grid';
for(let r=0;r<4;r++) g2.appendChild(tile(rotate(TILES[0],r),`rot ${r}`,0));
document.body.appendChild(g2);

const h3=document.createElement('h2'); h3.textContent='8 flower colours'; document.body.appendChild(h3);
const g3=document.createElement('div'); g3.className='grid';
for(let f=0;f<8;f++) g3.appendChild(tile([f,f,f,f],FLOWER_NAMES[f],f));
document.body.appendChild(g3);
</script>
</body>
</html>
