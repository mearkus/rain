<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff006e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff006e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b5de5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#9b5de5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="1"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050508"/>

  <!-- 4 blossoms arranged in 2×2 — mirrors the game's core mechanic -->
  <!-- top-left: Rose -->
  <circle cx="200" cy="200" r="110" fill="url(#g1)"/>
  <circle cx="200" cy="200" r="32" fill="#ff006e"/>

  <!-- top-right: Lotus (cyan) -->
  <circle cx="312" cy="200" r="110" fill="url(#g2)"/>
  <circle cx="312" cy="200" r="32" fill="#00f5ff"/>

  <!-- bottom-left: Plum -->
  <circle cx="200" cy="312" r="110" fill="url(#g3)"/>
  <circle cx="200" cy="312" r="32" fill="#9b5de5"/>

  <!-- bottom-right: Lily (green) -->
  <circle cx="312" cy="312" r="110" fill="url(#g4)"/>
  <circle cx="312" cy="312" r="32" fill="#39ff14"/>
</svg>
